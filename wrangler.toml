name = "chat-ol" # Your Worker name
main = "src/index.js"      # Path to your main Worker script
compatibility_date = "2024-04-23" # Use today's date or a recent one

# Define the Durable Object binding
[durable_objects]
bindings = [
    { name = "ROOM", class_name = "ChatRoom" }
]

# Migration for the Durable Object
[[migrations]]
tag = "v1"
new_classes = ["ChatRoom"]
new_sqlite_classes = true # ✅ 必须添加这一行
